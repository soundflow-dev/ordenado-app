<!doctype html>
<html lang="pt">

  <title>O meu ordenado / Mon salaire</title>

<header>
  <div class="top">
    <div class="brand"><svg viewBox="0 0 48 48"><path d="M24 2 L46 10 L46 26 Q46 38 24 46 Q2 38 2 26 L2 10 Z" fill="#534AB7"/><path d="M24 8 L40 15 L40 27 Q40 36 24 42 Q8 36 8 27 L8 15 Z" fill="#7F77DD" opacity="0.4"/><text x="24" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="white">€</text></svg><span><span data-i="appName">O meu ordenado</span><small id="userLine"></small></span></div>
    <div class="actions"><button id="langBtn" class="secondary">FR</button><button id="settingsBtn" class="secondary" data-i="settings">Definições</button><button id="mailBtn" class="purple" data-i="send">Enviar relatório</button><button id="logoutBtn" class="danger" data-i="logout">Sair</button></div>

<main>
  <section class="panel calendarPanel">
    <div class="controls">

      <div class="monthTitle" id="monthTitle"></div>
    </div>
    <div class="calendar" id="calendar"></div>
    <div id="thirteenthBox" class="panel thirteenth"></div>
    <div id="summary" class="summary"></div>
  </section>
  <dialog id="settingsDialog" class="settingsDialog"><div class="modal">
      <div class="modalHead"><h2 data-i="settings">Definições</h2><button id="closeSettings" class="danger" data-i="close">Fechar</button></div>
      <div class="settings">
        <div><label data-i="fullName">Nome completo</label><input id="fullName"></div>
        <div><label data-i="secretaryEmail">Email secretária</label><input id="secretaryEmail" type="email"></div>
        <div class="grid2"><div><label data-i="gross">Salário bruto mensal (€)</label><input id="gross" inputmode="decimal"></div><div><label data-i="netRate">Taxa líquido (%)</label><input id="netRate" inputmode="decimal"></div></div>
        <div class="grid2"><div><label data-i="hourly">Valor hora</label><input id="hourly" inputmode="decimal"></div><div><label data-i="vacDay">Valor férias/dia</label><input id="vacationDay" inputmode="decimal"></div></div>
        <button id="recalcVac" class="secondary" data-i="recalcVac">Recalcular férias</button>
        <div><label data-i="thirteenthMode">13º mês</label><select id="thirteenthMode"><option value="twice">Duas vezes/ano</option><option value="monthly">Duodécimos</option><option value="none">Sem 13º</option></select></div>
        <div><label data-i="thirteenthValue">Valor total 13º (€)</label><input id="thirteenthValue" inputmode="decimal"></div>
        <div class="grid2"><div><label data-i="seniority">Prémio antiguidade/mês</label><input id="seniority" inputmode="decimal"></div><label class="toggle"><input id="seniorityTax" type="checkbox"><span data-i="taxable">Tributável</span></label></div>
        <div class="grid2"><div><label data-i="mealExo">Refeição isenta/dia</label><input id="mealExo" inputmode="decimal"></div><div><label data-i="mealTax">Refeição tributável/dia</label><input id="mealTax" inputmode="decimal"></div></div>
        <div class="grid2"><div><label data-i="travelFixed">Reembolso desloc./mês</label><input id="travelFixed" inputmode="decimal"></div><label class="toggle"><input id="travelFixedTax" type="checkbox"><span data-i="taxable">Tributável</span></label></div>
        <div class="grid2"><div><label data-i="travelDay">Reembolso desloc./dia</label><input id="travelDay" inputmode="decimal"></div><label class="toggle"><input id="travelDayTax" type="checkbox"><span data-i="taxable">Tributável</span></label></div>
      </div>
      <p class="muted" id="saveState"></p>
      <h2 data-i="legend">Legenda</h2><p class="muted" data-i="legendText">F feriado, JS solidariedade, S sábado, D domingo. Borda verde indica horas introduzidas.</p>
  </div></dialog>
</main>

<dialog id="dayDialog"><div class="modal">
  <h3 id="modalTitle"></h3>
  <div class="choice">
    <label data-i="hoursWorked">Horas trabalhadas</label>
    <input id="hoursInput" inputmode="decimal" placeholder="7">
    <button id="workChoice" class="purple" data-i="saveHours">Guardar horas</button>
    <button id="vacChoice" class="secondary" data-i="vacation">Férias pagas</button>
    <button id="absChoice" class="secondary" data-i="absence">Ausência não paga</button>
    <button id="clearChoice" class="ghost" data-i="clear">Limpar dia</button>
    <button id="closeModal" class="danger" data-i="close">Fechar</button>
  </div>
</div></dialog>
<div id="toast" class="toast"></div>

init();
async function init(){const r=await fetch('/api/me'); if(!r.ok){location.href='/';return} user=(await r.json()).user; $('#userLine').textContent=user.email; const d=await fetch('/api/data').then(r=>r.json()); if(d) state={...state,...d,lang:localStorage.getItem('ordenadoLang')||d.lang||state.lang,settings:{...state.settings,...(d.settings||{})},days:d.days||{},months:d.months||{}}; if(!state.settings.hourly) state.settings.hourly=round(parseDecimal(state.settings.gross)/151.67); if(!state.settings.fullName) state.settings.fullName=user.name; localStorage.setItem('ordenadoLang',state.lang); current=new Date(); current.setDate(1); bind(); syncSettings(); render(); $('#saveState').textContent=t('synced');}
function bind(){ $('#prev').onclick=()=>{current.setMonth(current.getMonth()-1);render()}; $('#next').onclick=()=>{current.setMonth(current.getMonth()+1);render()}; $('#today').onclick=()=>{current=new Date();current.setDate(1);render()}; $('#langBtn').onclick=()=>{state.lang=state.lang==='pt'?'fr':'pt';localStorage.setItem('ordenadoLang',state.lang);render();scheduleSave()}; $('#settingsBtn').onclick=()=>$('#settingsDialog').showModal(); $('#closeSettings').onclick=()=>$('#settingsDialog').close(); $('#logoutBtn').onclick=async()=>{await save();await fetch('/api/logout',{method:'POST'});location.href='/'}; $('#recalcVac').onclick=()=>{$('#vacationDay').value=round((num('gross')*12*.10)/25);settingsChanged()}; $('#mailBtn').onclick=sendReport; fields.forEach(id=>{$('#'+id).oninput=settingsChanged; $('#'+id).onchange=settingsChanged}); $('#closeModal').onclick=()=>$('#dayDialog').close(); $('#workChoice').onclick=()=>setDay({type:'work',hours:numEl($('#hoursInput'))}); $('#hoursInput').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();setDay({type:'work',hours:numEl($('#hoursInput'))})}}; $('#vacChoice').onclick=()=>setDay({type:'vacation'}); $('#absChoice').onclick=()=>setDay({type:'absence'}); $('#clearChoice').onclick=()=>{delete state.days[selected]; $('#dayDialog').close(); changed()};}
function t(k){return (I[state.lang]||I.pt)[k]||k} function applyI(){$$('[data-i]').forEach(e=>e.textContent=t(e.dataset.i)); $('#langBtn').textContent=state.lang==='pt'?'FR':'PT'; document.documentElement.lang=state.lang; const mode=$('#thirteenthMode'); if(mode){ mode.querySelector('[value="twice"]').textContent=t('twice'); mode.querySelector('[value="monthly"]').textContent=t('monthly'); mode.querySelector('[value="none"]').textContent=t('none13'); }}
function syncSettings(){fields.forEach(id=>{const el=$('#'+id), v=state.settings[id]; if(el.type==='checkbox')el.checked=!!v; else el.value=v ?? ''})}
function settingsChanged(){fields.forEach(id=>{const el=$('#'+id); state.settings[id]=el.type==='checkbox'?el.checked:(isDecimalField(id)?numEl(el):el.value)}); changed()}

function parseDecimal(value){return Number(String(value||'').trim().replace(/\s/g,'').replace(',','.'))||0}
function num(id){return numEl($('#'+id))} function numEl(el){return parseDecimal(el.value)} function round(n){return Math.round((Number(n)||0)*100)/100}
function render(){applyI(); syncSettings(); const y=current.getFullYear(),m=current.getMonth(); $('#monthTitle').textContent=current.toLocaleDateString(state.lang==='fr'?'fr-FR':'pt-PT',{month:'long',year:'numeric'}); renderCalendar(y,m); render13(y,m); renderSummary(y,m)}
function isHol(s){return (HOL[Number(s.slice(0,4))]||[]).includes(s)} function isSol(s){return SOLIDARITY[Number(s.slice(0,4))]===s} function dow(d){return (d.getDay()+6)%7} function isWeekendDate(s){const d=new Date(s+'T00:00:00'); return d.getDay()===0||d.getDay()===6} function isWorkday(s){const d=new Date(s+'T00:00:00'); return d.getDay()>=1&&d.getDay()<=5&&!isHol(s)}

function monthKey(y,m){return `${y}-${String(m+1).padStart(2,'0')}`}
function renderCalendar(y,m){const cal=$('#calendar'); cal.innerHTML=''; const labels=state.lang==='fr'?['Lun','Mar','Mer','Jeu','Ven','Sam','Dim','Total']:['Seg','Ter','Qua','Qui','Sex','Sáb','Dom','Total']; labels.forEach(x=>cal.append(el('div','head',x))); const first=new Date(y,m,1), blanks=dow(first), days=datesOfMonth(y,m); let cells=[]; for(let i=0;i<blanks;i++)cells.push(null); days.forEach(d=>cells.push(d)); while(cells.length%7)cells.push(null); for(let w=0;w<cells.length;w+=7){let week=cells.slice(w,w+7); week.forEach(s=>cal.append(dayCell(s))); cal.append(weekCell(week));}}
function dayCell(s){const c=el('div','day'); if(!s){c.classList.add('empty');return c} const d=new Date(s+'T00:00:00'), data=state.days[s]; c.innerHTML=`<div class="num">${d.getDate()}</div>`; const badge=d.getDay()===6?'S':d.getDay()===0?'D':isSol(s)?'JS':isHol(s)?'F':''; if(badge)c.append(el('div','badge',badge)); if(isHol(s))c.classList.add('holiday'); if(isSol(s))c.classList.add('solidarity'); if(d.getDay()===6)c.classList.add('sat'); if(d.getDay()===0)c.classList.add('sun'); if(data?.type==='vacation')c.classList.add('vac'); if(data?.type==='absence')c.classList.add('abs'); if(data?.type==='work'&&data.hours>0)c.classList.add('hours'); const txt=data?.type==='work'?`${data.hours}h`:data?.type==='vacation'?'CP':data?.type==='absence'?'ABS':''; if(txt)c.append(el('div','info',txt)); c.onclick=()=>openDay(s); return c}
function weekCell(week){const r=calcWeek(week.filter(Boolean)); const c=el('div','weekTotal'); c.innerHTML=`<b>${round(r.workHours)}h</b><span class="hs">HS ${round(r.hs25+r.hs50)}h</span>`; return c}
function openDay(s){selected=s; const data=state.days[s]||{}; $('#modalTitle').textContent=new Date(s+'T00:00:00').toLocaleDateString(state.lang==='fr'?'fr-FR':'pt-PT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}); $('#hoursInput').value=data.type==='work'?data.hours:7; $('#dayDialog').showModal(); setTimeout(()=>$('#hoursInput').select(),50)}
function setDay(v){state.days[selected]=v; $('#dayDialog').close(); changed()}
function calcWeek(week){let workHours=0,threshold=0,normalCandidates=[]; const out={workHours:0,normal:0,hs25:0,hs50:0,sat:0,sun:0,hol:0,satDays:0,sunDays:0,holDays:0,vac:0,abs:0,workDays:0}; week.forEach(s=>{const d=new Date(s+'T00:00:00'), data=state.days[s], h=data?.type==='work'?parseDecimal(data.hours):0; if(data?.type==='vacation'){threshold+=7; out.vac++} else if(data?.type==='absence'){out.abs++} else if(data?.type==='work'){workHours+=h; out.workDays++; threshold+=h; if(d.getDay()===6){out.sat+=h; out.satDays++} else if(d.getDay()===0){out.sun+=h; out.sunDays++} else if(isHol(s)){out.hol+=h; out.holDays++} else normalCandidates.push({s,h})} else if(isHol(s)){threshold+=7} }); let weeklyExtra=Math.max(0,threshold-35); normalCandidates.reverse().forEach(x=>{const extra=Math.min(x.h,weeklyExtra); weeklyExtra-=extra; out.normal+=x.h-extra; out.hs50+=Math.max(0,extra-8); out.hs25+=Math.min(8,extra)}); out.workHours=workHours; return out}
function calcMonth(y,m){const days=datesOfMonth(y,m), weeks=[]; let tmp=[]; const firstPad=dow(new Date(y,m,1)); for(let i=0;i<firstPad;i++)tmp.push(null); days.forEach(s=>{tmp.push(s); if(tmp.length===7){weeks.push(tmp.filter(Boolean)); tmp=[]}}); if(tmp.length)weeks.push(tmp.filter(Boolean)); const total={workHours:0,normal:0,hs25:0,hs50:0,sat:0,sun:0,hol:0,satDays:0,sunDays:0,holDays:0,vac:0,abs:0,workDays:0,filled:0,missing:0,workable:0}; weeks.forEach(w=>{const r=calcWeek(w); Object.keys(r).forEach(k=>total[k]=(total[k]||0)+r[k])}); days.forEach(s=>{if(isWorkday(s)){total.workable++; const d=state.days[s]; if(!d||d.type==='absence')total.missing++} if(state.days[s])total.filled++}); return total}
function render13(y,m){const box=$('#thirteenthBox'), k=monthKey(y,m), mode=state.settings.thirteenthMode; box.innerHTML=''; box.classList.remove('show'); if(mode==='twice'){box.classList.add('show'); box.innerHTML=`<label class="toggle"><input id="include13" type="checkbox" ${state.months[k]?.include13?'checked':''}> <span>${t('include13')} (${euro((numVal('thirteenthValue'))/2)})</span></label>`; $('#include13').onchange=e=>{state.months[k]={...(state.months[k]||{}),include13:e.target.checked};changed()}} else if(mode==='monthly'){box.classList.add('show'); box.innerHTML=`<span class="pill amber">${t('auto13')}: ${euro(numVal('thirteenthValue')/12)}</span>`}}
function numVal(k){return parseDecimal(state.settings[k])}
function renderSummary(y,m){const s=calcMonth(y,m), wrap=$('#summary'); wrap.innerHTML=''; if(!s.filled){wrap.append(el('div','card',t('noData')));return} const items=[[t('totalHours'),s.workHours],[t('normalHours'),s.normal],[t('weekExtra25'),s.hs25],[t('weekExtra50'),s.hs50],[t('satExtra'),s.sat],[t('sunExtra'),s.sun],[t('holidayExtra'),s.hol],[t('workedSaturdays'),s.satDays],[t('workedSundays'),s.sunDays],[t('workedHolidays'),s.holDays],[t('vacationDays'),s.vac],[t('absenceDays'),s.abs],[t('missingDays'),s.missing]]; items.forEach(([l,v])=>wrap.append(card(l,round(v),l===t('missingDays')&&v>0))); const pay=salary(s,y,m); const n=el('div','card net'); n.innerHTML=`<span>${t('estimatedNet')}</span><strong>${euro(pay.net)}</strong><div class="muted">${t('base')} ${euro(pay.base)} · ${t('grossTaxable')} ${euro(pay.grossTaxable)}</div>${pay.absenceDiscount?`<span class="pill red">${t('missingDays')} -${euro(pay.absenceDiscount)}</span>`:''}<span class="pill purple">${t('vacations')} ${s.vac}</span>${pay.thirteenth?`<span class="pill amber">13º ${euro(pay.thirteenth)}</span>`:''}<div class="muted">${t('exempt')} ${euro(pay.exempt)}</div>`; wrap.append(n)}
function card(label,val,danger){const c=el('div','card'+(danger?' danger':'')); c.innerHTML=`<span>${label}</span><strong>${val}</strong>`; return c}
function salary(s,y,m){const hourly=numVal('hourly'), base=numVal('gross'), dayBase=s.workable?base/s.workable:0, absenceDiscount=dayBase*s.missing, present=Math.max(0,s.workable-s.missing), ratio=s.workable?present/s.workable:0; const extra=s.hs25*hourly*1.25+s.hs50*hourly*1.5+s.sat*hourly*1.5+s.sun*hourly*2+s.hol*hourly*2; let taxable=base-absenceDiscount+extra+numVal('mealTax')*s.workDays; let exempt=numVal('mealExo')*s.workDays; const add=(value,tax)=>tax?taxable+=value:exempt+=value; add(numVal('seniority')*ratio,!!state.settings.seniorityTax); add(numVal('travelFixed')*ratio,!!state.settings.travelFixedTax); add(numVal('travelDay')*s.workDays,!!state.settings.travelDayTax); let thirteenth=0; if(state.settings.thirteenthMode==='monthly')thirteenth=numVal('thirteenthValue')/12; if(state.settings.thirteenthMode==='twice'&&state.months[monthKey(y,m)]?.include13)thirteenth=numVal('thirteenthValue')/2; taxable+=thirteenth; return{base,grossTaxable:taxable,absenceDiscount,exempt,thirteenth,net:taxable*(numVal('netRate')/100)+exempt}}
function sendReport(){const y=current.getFullYear(),m=current.getMonth(), s=calcMonth(y,m), name=state.settings.fullName||user.name, month=current.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}); const days=datesOfMonth(y,m).map(d=>{const x=state.days[d]; if(!x)return null; const dd=new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'2-digit'}); return `${dd}: ${x.type==='work'?`${x.hours} h, travaillé`:x.type==='vacation'?'congé payé':'absence non payée'}`}).filter(Boolean).join('\n'); let weeks=[]; const firstPad=dow(new Date(y,m,1)); let tmp=[]; for(let i=0;i<firstPad;i++)tmp.push(null); datesOfMonth(y,m).forEach(d=>{tmp.push(d); if(tmp.length===7){weeks.push(tmp.filter(Boolean));tmp=[]}}); if(tmp.length)weeks.push(tmp.filter(Boolean)); const wk=weeks.map((w,i)=>`Semaine ${i+1}: ${round(calcWeek(w).workHours)} h`).join('\n'); const body=`Détail par jour\n${days||'Aucune saisie'}\n\nRécapitulatif par semaine\n${wk}\n\nRécapitulatif du mois\nTotal heures: ${round(s.workHours)} h\nHeures normales: ${round(s.normal)} h\nHS +25%: ${round(s.hs25)} h\nHS +50% semaine: ${round(s.hs50)} h\nHS samedis +50%: ${round(s.sat)} h\nHS dimanches +100%: ${round(s.sun)} h\nHS fériés +100%: ${round(s.hol)} h\nSamedis travaillés: ${s.satDays}\nDimanches travaillés: ${s.sunDays}\nFériés travaillés: ${s.holDays}\nCongés: ${s.vac}\nAbsences: ${s.abs}\nFrais de déplacement: ${s.workDays} jours`; const to=state.settings.secretaryEmail||''; location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(`Rapport d'heures - ${month} - ${name}`)}&body=${encodeURIComponent(body)}`}
function exportBackup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`ordenado-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href)}
function importBackup(e){const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{const d=JSON.parse(r.result); state={...state,...d,settings:{...state.settings,...(d.settings||{})},days:d.days||{},months:d.months||{}}; changed(); toast('Backup importado')}catch{toast('JSON inválido')}}; r.readAsText(f)}
function toast(t){const x=$('#toast'); x.textContent=t; x.classList.add('show'); setTimeout(()=>x.classList.remove('show'),1800)} function el(tag,cls,txt){const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e}
</script>
