  <title>O meu ordenado / Mon salaire</title>

    header{padding:16px 12px 4px}

    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.seg{display:inline-flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}.seg button{border:0;border-radius:0;background:#fff;color:#8a8a8a;min-width:48px}.seg button.active{background:var(--green);color:#fff}
    main{max-width:980px;margin:auto;padding:6px 12px 24px}.panel{background:transparent;border:0;border-radius:0;padding:0}.calendarPanel{min-width:0}.controls{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;margin:14px 0}.monthTitle{display:none}.dateSelect{width:auto;min-width:112px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:16px;background:#fff;color:var(--ink)}
    .calendar{display:grid;grid-template-columns:repeat(7,minmax(38px,1fr)) minmax(54px,.9fr);gap:4px;background:transparent;border:0;overflow:visible}.head{min-height:auto;padding:3px 1px;color:#8d8d8d;font-weight:900;text-align:center;font-size:12px}.head:nth-child(6){color:#1d68ad}.head:nth-child(7){color:#ad2d33}.head,.day,.weekTotal{border:0}.day,.weekTotal{min-height:72px;border:1px solid var(--line);border-radius:10px;padding:5px;background:#fff}.day{position:relative;cursor:pointer}.day:hover{outline:2px solid var(--green);outline-offset:-2px}.empty{background:transparent;border-color:transparent;cursor:default}.num{font-weight:900;color:#8d8d8d;font-size:13px}.badge{position:absolute;right:5px;top:5px;font-size:10px;font-weight:950;color:#b9b9b9}.info{margin-top:8px;font-weight:900;font-size:14px;line-height:1.05;color:#08775d;word-break:normal}.hours{border:2px solid #18a77b}.holiday{background:#fff2dc}.solidarity{background:#fff7c8}.sat{background:#edf5ff}.sun{background:#fff0f2}.vac{background:#eeeaff;border:2px solid #8274f2}.vac .info,.vac .num{color:#5a4fcf}.abs{background:#f1f1f1}.weekTotal{background:#effff9;border-color:#bfeee0;text-align:center;color:#08775d;font-size:11px;font-weight:900;overflow:hidden}.weekTotal b{display:block;font-size:18px;margin:4px 0}.weekTotal .hs{display:block;font-weight:950;line-height:1.05;font-size:10px}.weekTotal .hs25{color:#9a5b00}.weekTotal .hs50{color:#b35b00}.weekTotal .hs100{color:#a82f39}
    .legend{display:flex;gap:9px;flex-wrap:wrap;margin:12px 0 18px;color:#858585;font-size:13px;font-weight:650}.legend span{display:inline-flex;align-items:center;gap:5px}.sw{width:11px;height:11px;border-radius:3px;border:2px solid var(--line);display:inline-block}.sw.hol{border-color:#ffa629}.sw.sol{border-color:#f28a00}.sw.satSw{border-color:#badaff}.sw.sunSw{border-color:#ffbdc7}.sw.hoursSw{border-color:#18a77b}.sw.vacSw{border-color:#8274f2}.sw.absSw{border-color:#aaa}.sw.totalSw{border-color:#bfeee0}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}.card{background:#fff;border:1px solid #e4e1da;border-radius:12px;padding:16px}.card strong{display:block;font-size:28px}.card span{color:#8b8b8b;font-size:15px;font-weight:750}.card.danger strong{color:var(--danger)}
    .net{grid-column:1/-1;margin-top:10px;border:3px solid var(--green);text-align:center;padding:28px}.net strong{font-size:54px;color:#08775d}.pill{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900;margin:4px 4px 0 0}.pill.purple{background:#eee6ff;color:var(--purple)}.pill.amber{background:#fff0cc;color:#8a5d00}.pill.red{background:#ffe3e3;color:var(--danger)}
    .settings{display:grid;gap:10px}label{font-size:12px;font-weight:900;color:#42424a}input,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:16px;background:#fff}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.toggle{display:flex;gap:8px;align-items:center}.toggle input{width:auto}.muted{color:var(--muted);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap}.thirteenth{display:none;margin-top:12px}.thirteenth.show{display:block}.overtimePay{display:none;margin-top:12px;background:#fff;border:1px solid #e4e1da;border-radius:12px;padding:14px}.overtimePay.show{display:block}.overtimePay h3{margin:0 0 8px}.overtimePay .grid3{margin-top:10px}.bankList{display:grid;gap:8px;margin-top:12px}.bankEntry{border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff;display:grid;gap:4px}.bankEntry strong{font-size:14px}.bankEntry span{color:var(--muted);font-size:12px}.balance{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.balance .card{padding:10px}.balance .card strong{font-size:20px}.modalActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

<body>
<header>
  <div class="top">
    <div class="brand"><svg viewBox="0 0 48 48"><path d="M24 2 L46 10 L46 26 Q46 38 24 46 Q2 38 2 26 L2 10 Z" fill="#534AB7"/><path d="M24 8 L40 15 L40 27 Q40 36 24 42 Q8 36 8 27 L8 15 Z" fill="#7F77DD" opacity="0.4"/><text x="24" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="white">€</text></svg><span><span data-i="appName">O meu ordenado</span><small id="userLine"></small></span></div>
    <div class="actions">
      <span class="seg"><button id="ptBtn" type="button">PT</button><button id="frBtn" type="button">FR</button></span>
      <button id="settingsBtn" class="secondary" data-i="settings">Definições</button>
      <button id="bankBtn" class="secondary" data-i="hourBank">Banco de horas</button>
      <button id="mailBtn" class="purple" data-i="send">Enviar relatório</button>
      <button id="exportBtn" class="orange" data-i="exportBackup">Exportar backup</button>
      <label class="fileBtn secondary"><span data-i="importBackup">Importar backup</span><input id="importFile" type="file" accept="application/json" hidden></label>
    </div>
  </div>
</header>
<main>
  <section class="panel calendarPanel">
    <div class="controls">
      <select id="monthSelect" class="dateSelect"></select>
      <select id="yearSelect" class="dateSelect"></select>
      <div class="monthTitle" id="monthTitle"></div>
    </div>
    <div class="calendar" id="calendar"></div>
    <div id="legend" class="legend"></div>
    <div id="thirteenthBox" class="panel thirteenth"></div>
    <div id="overtimePayBox" class="overtimePay"></div>
    <div id="summary" class="summary"></div>
  </section>
  <dialog id="settingsDialog" class="settingsDialog"><div class="modal">
      <div class="modalHead"><h2 data-i="settings">Definições</h2><button id="closeSettings" class="danger" data-i="close">Fechar</button></div>
      <div class="settings">
        <div><label data-i="fullName">Nome completo</label><input id="fullName"></div>
        <div><label data-i="secretaryEmail">Email secretária</label><input id="secretaryEmail" type="email"></div>
        <div class="grid2"><div><label data-i="gross">Salário bruto mensal (€)</label><input id="gross" inputmode="decimal"></div><div><label data-i="netRate">Taxa líquido (%)</label><input id="netRate" inputmode="decimal"></div></div>
        <div class="grid2"><div><label data-i="hourly">Valor hora</label><input id="hourly" inputmode="decimal"></div><div><label data-i="vacDay">Valor férias/dia</label><input id="vacationDay" inputmode="decimal"></div></div>
        <button id="recalcVac" class="secondary" data-i="recalcVac">Recalcular férias</button>
        <div><label data-i="thirteenthMode">13º mês</label><select id="thirteenthMode"><option value="twice">Duas vezes/ano</option><option value="monthly">Duodécimos</option><option value="none">Sem 13º</option></select></div>
        <div><label data-i="thirteenthValue">Valor total 13º (€)</label><input id="thirteenthValue" inputmode="decimal"></div>
        <div class="grid2"><div><label data-i="seniority">Prémio antiguidade/mês</label><input id="seniority" inputmode="decimal"></div><label class="toggle"><input id="seniorityTax" type="checkbox"><span data-i="taxable">Tributável</span></label></div>
        <div class="grid2"><div><label data-i="mealExo">Refeição isenta/dia</label><input id="mealExo" inputmode="decimal"></div><div><label data-i="mealTax">Refeição tributável/dia</label><input id="mealTax" inputmode="decimal"></div></div>
        <div class="grid2"><div><label data-i="travelFixed">Reembolso desloc./mês</label><input id="travelFixed" inputmode="decimal"></div><label class="toggle"><input id="travelFixedTax" type="checkbox"><span data-i="taxable">Tributável</span></label></div>
        <div class="grid2"><div><label data-i="travelDay">Reembolso desloc./dia</label><input id="travelDay" inputmode="decimal"></div><label class="toggle"><input id="travelDayTax" type="checkbox"><span data-i="taxable">Tributável</span></label></div>
        <div><label data-i="mutuelle">Mutuelle (€)</label><input id="mutuelle" inputmode="decimal"></div>
      </div>
      <p class="muted" id="saveState"></p>
      <button id="logoutBtn" class="danger" data-i="logout">Sair</button>
      <h2 data-i="legend">Legenda</h2><p class="muted" data-i="legendText">F feriado, JS solidariedade, S sábado, D domingo. Borda verde indica horas introduzidas.</p>
  </div></dialog>
</main>

<dialog id="dayDialog"><div class="modal">
  <h3 id="modalTitle"></h3>
  <div class="choice">
    <label data-i="hoursWorked">Horas trabalhadas</label>
    <input id="hoursInput" inputmode="decimal" placeholder="7">
    <label class="toggle"><input id="travelIncluded" type="checkbox" checked> <span data-i="travelIncluded">Pagar deslocação neste dia</span></label>
    <button id="workChoice" class="purple" data-i="saveHours">Guardar horas</button>
    <button id="vacChoice" class="secondary" data-i="vacation">Férias pagas</button>
    <button id="absChoice" class="secondary" data-i="absence">Ausência não paga</button>
    <button id="clearChoice" class="ghost" data-i="clear">Limpar dia</button>
    <button id="closeModal" class="danger" data-i="close">Fechar</button>
  </div>
</div></dialog>
<dialog id="bankDialog" class="settingsDialog"><div class="modal">
  <div class="modalHead"><h2 data-i="hourBank">Banco de horas</h2><button id="closeBank" class="danger" data-i="close">Fechar</button></div>
  <div id="bankBalance" class="balance"></div>
  <div class="settings">
    <h3 data-i="manualMovement">Movimento manual</h3>
    <div class="grid3">
      <div><label data-i="movementDate">Data</label><input id="bankDate" type="date"></div>
      <div><label data-i="movementType">Tipo</label><select id="bankType"><option value="add" data-i="movementAdd">Acrescentar</option><option value="remove" data-i="movementRemove">Retirar</option><option value="paid" data-i="movementPaid">Pago</option></select></div>
      <div><label data-i="movementCategory">Categoria</label><select id="bankCategory"></select></div>
    </div>
    <div class="grid2">
      <div><label data-i="movementHours">Horas</label><input id="bankHours" inputmode="decimal" placeholder="0"></div>
      <div><label data-i="movementNote">Nota</label><input id="bankNote"></div>
    </div>
    <button id="addBankMovement" class="purple" data-i="addMovement">Adicionar movimento</button>
    <h3 data-i="bankExtract">Extrato</h3>
    <div class="grid2">
      <div><label data-i="from">De</label><input id="bankFrom" type="date"></div>
      <div><label data-i="to">Até</label><input id="bankTo" type="date"></div>
    </div>
    <div class="modalActions">
      <button id="downloadBankPdf" class="secondary" data-i="downloadPdf">Descarregar PDF</button>
      <button id="sendBankPdf" class="purple" data-i="sendPdf">Enviar PDF</button>
    </div>
  </div>
  <div id="bankEntries" class="bankList"></div>
</div></dialog>
<dialog id="monthReportDialog"><div class="modal">
  <div class="modalHead"><h2 data-i="monthlyReport">Relatório mensal</h2><button id="closeMonthReport" class="danger" data-i="close">Fechar</button></div>
  <p class="muted" data-i="monthlyReportHint">Escolha se quer visualizar o PDF antes ou enviar diretamente para a secretária.</p>
  <div class="choice">
    <button id="viewMonthReport" class="secondary" data-i="viewPdf">Visualizar PDF</button>
    <button id="downloadMonthReport" class="secondary" data-i="downloadReport">Descarregar relatório</button>
    <button id="sendMonthReportDirect" class="purple" data-i="sendDirect">Enviar direto</button>
  </div>
</div></dialog>
<div id="toast" class="toast"></div>

function addOt(a,b){const out=emptyOt(); OT_KEYS.forEach(k=>out[k]=(a[k]||0)+(b[k]||0)); return out}
function sumOt(o){return OT_KEYS.reduce((n,k)=>n+(Number(o?.[k])||0),0)}
function extraAmount(o,hourly){return (o.p25||0)*hourly*1.25+(o.p50||0)*hourly*1.5+(o.p100||0)*hourly*2}
function earnedOvertime(s){return{p25:s.hs25||0,p50:(s.hs50||0)+(s.sat||0),p100:(s.sun||0)+(s.hol||0)}}
function categoryKey(k){return k==='hs25'?'p25':(k==='hs50'||k==='sat')?'p50':(k==='sun'||k==='hol')?'p100':k}
function paidValue(paid,k){if(String(paid[k]??'').trim()!=='')return paid[k]; if(k==='p25')return paid.hs25??''; if(k==='p50')return sumMaybe(paid.hs50,paid.sat); if(k==='p100')return sumMaybe(paid.sun,paid.hol); return ''}
function sumMaybe(...values){const filled=values.filter(v=>String(v??'').trim()!==''); return filled.length?round(filled.reduce((n,v)=>n+parseDecimal(v),0)):''}
function hasPaidOverride(k){const paid=state.months[k]?.paidOvertime||{}; return ['p25','p50','p100','hs25','hs50','sat','sun','hol'].some(x=>String(paid[x]??'').trim()!=='')}
function paidOvertimeFor(s,k){const earned=earnedOvertime(s), out=emptyOt(); if(!hasPaidOverride(k)){OT_KEYS.forEach(x=>out[x]=earned[x]||0); return out} const paid=state.months[k]?.paidOvertime||{}; OT_KEYS.forEach(x=>out[x]=Math.min(parseDecimal(paidValue(paid,x)),earned[x]||0)); return out}
function bankedForMonth(s,k){const earned=earnedOvertime(s), paid=paidOvertimeFor(s,k), out=emptyOt(); if(!hasPaidOverride(k))return out; OT_KEYS.forEach(x=>out[x]=Math.max(0,(earned[x]||0)-(paid[x]||0))); return out}
function paidLabel(k){return ({p25:t('paid25'),p50:t('paid50'),p100:t('paid100')})[k]}
function catLabel(k){return OT_LABELS[k]||k}
function bankEntries(){const entries=[]; Object.keys(state.months||{}).sort().forEach(k=>{if(!hasPaidOverride(k))return; const [y,mm]=k.split('-').map(Number), s=calcMonth(y,mm-1), banked=bankedForMonth(s,k), date=iso(new Date(y,mm,0)); OT_KEYS.forEach(cat=>{if(banked[cat]>0)entries.push({id:`auto-${k}-${cat}`,auto:true,date,type:'add',category:cat,hours:round(banked[cat]),note:`${t('paidOvertime')} ${k}`})})}); (state.bank||[]).forEach(e=>entries.push({...e,category:categoryKey(e.category),auto:false,hours:parseDecimal(e.hours)})); return entries.sort((a,b)=>String(a.date).localeCompare(String(b.date))||String(a.id).localeCompare(String(b.id)))}
function balanceFrom(entries){const out=emptyOt(); entries.forEach(e=>{const cat=categoryKey(e.category); if(!OT_KEYS.includes(cat))return; const h=parseDecimal(e.hours); out[cat]+=(e.type==='add'?h:-h)}); return out}
function openBank(){const today=iso(new Date()); $('#bankDate').value=today; $('#bankFrom').value=`${current.getFullYear()}-${String(current.getMonth()+1).padStart(2,'0')}-01`; $('#bankTo').value=iso(new Date(current.getFullYear(),current.getMonth()+1,0)); renderBank(); $('#bankDialog').showModal()}
function renderBank(){applyI(); $('#bankCategory').innerHTML=OT_KEYS.map(k=>`<option value="${k}">${catLabel(k)}</option>`).join(''); const entries=bankEntries(), bal=balanceFrom(entries); $('#bankBalance').innerHTML=OT_KEYS.map(k=>`<div class="card"><span>${catLabel(k)}</span><strong>${round(bal[k])}h</strong></div>`).join(''); $('#bankEntries').innerHTML=entries.length?entries.slice().reverse().map(e=>`<div class="bankEntry"><strong>${escapeHtml(e.date)} · ${escapeHtml(catLabel(e.category))} · ${e.type==='add'?'+':'-'}${round(e.hours)}h</strong><span>${escapeHtml(typeLabel(e.type))}${e.auto?' · auto':''}${e.note?` · ${escapeHtml(e.note)}`:''}</span></div>`).join(''):`<div class="bankEntry"><strong>${t('noMovements')}</strong></div>`}
function typeLabel(type){return type==='add'?t('movementAdd'):type==='paid'?t('movementPaid'):t('movementRemove')}
function addBankMovement(){const hours=parseDecimal($('#bankHours').value); if(!hours){toast(t('invalidHours'));return} state.bank=[...(state.bank||[]),{id:`m${Date.now()}`,date:$('#bankDate').value||iso(new Date()),type:$('#bankType').value,category:$('#bankCategory').value,hours:round(hours),note:$('#bankNote').value.trim()}]; $('#bankHours').value=''; $('#bankNote').value=''; renderBank(); changed()}
function reportPayload(){const from=$('#bankFrom').value||'1900-01-01', to=$('#bankTo').value||'2999-12-31', entries=bankEntries(), filtered=entries.filter(e=>e.date>=from&&e.date<=to), opening=balanceFrom(entries.filter(e=>e.date<from)), closing=balanceFrom(entries.filter(e=>e.date<=to)); return{from,to,name:state.settings.fullName||user.name,toEmail:state.settings.secretaryEmail||'',entries:filtered.map(e=>({date:e.date,type:e.type,category:e.category,hours:round(e.hours),note:e.note||''})),opening,closing}}
async function bankPdf(sendEmail){const payload=reportPayload(); if(sendEmail&&!payload.toEmail){toast(t('invalidEmail'));return} const r=await fetch('/api/hour-bank/report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload,sendEmail})}); if(!r.ok){toast('Erro');return} if(sendEmail){toast(t('reportSent'));return} downloadPdf(await r.blob(),`banco-horas-${payload.from}-${payload.to}.pdf`)}
async function viewMonthReport(){const payload=monthlyReportPayload(), r=await fetch('/api/month-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); if(!r.ok){toast('Erro');return} openPdf(await r.blob(),'rapport-heures-mensuel.pdf'); toast(t('reportDownloaded'))}
async function downloadMonthReport(){const payload=monthlyReportPayload(), r=await fetch('/api/month-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); if(!r.ok){toast('Erro');return} downloadPdf(await r.blob(),`rapport-heures-${payload.month.replace(/\s+/g,'-')}.pdf`)}
async function sendMonthReportDirect(){const payload=monthlyReportPayload(); if(!payload.toEmail){toast(t('invalidEmail'));return} const r=await fetch('/api/month-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload,sendEmail:true})}); toast(r.ok?t('monthlyReportSent'):'Erro'); if(r.ok)$('#monthReportDialog').close()}
function openPdf(blob,filename){const url=URL.createObjectURL(blob); window.open(url,'_blank'); setTimeout(()=>URL.revokeObjectURL(url),60000)}
function downloadPdf(blob,filename){const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href); toast(t('reportDownloaded'))}
function monthlyReportPayload(){const y=current.getFullYear(),m=current.getMonth(), s=calcMonth(y,m), name=state.settings.fullName||user.name, month=current.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}); const days=datesOfMonth(y,m).map(d=>{const x=state.days[d]; if(!x)return null; const dd=new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'2-digit'}); return {date:dd,type:x.type,hours:x.type==='work'?round(parseDecimal(x.hours)):0,travel:x.type==='work'?x.travel!==false:false}}).filter(Boolean); let weeks=[]; const firstPad=dow(new Date(y,m,1)); let tmp=[]; for(let i=0;i<firstPad;i++)tmp.push(null); datesOfMonth(y,m).forEach(d=>{tmp.push(d); if(tmp.length===7){weeks.push(tmp.filter(Boolean));tmp=[]}}); if(tmp.length)weeks.push(tmp.filter(Boolean)); return{toEmail:state.settings.secretaryEmail||'',name,month,days,weeks:weeks.map((w,i)=>({label:`Semaine ${i+1}`,hours:round(calcWeek(w).workHours)})),summary:{workHours:round(s.workHours),normal:round(s.normal),hs25:round(s.hs25),hs50:round(s.hs50),sat:round(s.sat),sun:round(s.sun),hol:round(s.hol),satDays:s.satDays,sunDays:s.sunDays,holDays:s.holDays,vac:s.vac,abs:s.abs,travelDays:s.travelDays}}}
function exportBackup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`ordenado-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href)}
function importBackup(e){const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{const d=JSON.parse(r.result); state={...state,...d,settings:{...state.settings,...(d.settings||{})},days:d.days||{},months:d.months||{},bank:Array.isArray(d.bank)?d.bank:[]}; changed(); toast('Backup importado')}catch{toast('JSON inválido')}}; r.readAsText(f)}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(t){const x=$('#toast'); x.textContent=t; x.classList.add('show'); setTimeout(()=>x.classList.remove('show'),1800)} function el(tag,cls,txt){const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e}
</script>
