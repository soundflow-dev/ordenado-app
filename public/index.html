<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>O meu ordenado / Mon salaire</title>
  <style>
    :root{--bg:#f5f5f0;--green:#1D9E75;--purple:#534AB7;--ink:#25252c;--muted:#747482;--line:#deded6;--card:#fff}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink)}
    main{min-height:100vh;display:grid;place-items:center;padding:24px}.shell{width:min(980px,100%);display:grid;grid-template-columns:1fr 1.15fr;gap:24px;align-items:stretch}
    .brand,.panel{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:28px;box-shadow:0 18px 45px rgba(28,28,35,.08)}
    .brand{display:flex;flex-direction:column;justify-content:space-between;min-height:560px}.logo{width:64px;height:64px}.brand h1{font-size:42px;line-height:1.02;margin:24px 0 12px}.brand p{font-size:18px;color:var(--muted);line-height:1.45}
    .tabs{display:flex;gap:8px;margin-bottom:20px}.tabs button{flex:1}.tab{display:none}.tab.active{display:block}
    label{font-weight:700;font-size:13px;display:block;margin:14px 0 6px}input{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px 13px;font-size:16px;background:#fff}
    button{border:0;border-radius:8px;background:var(--green);color:white;font-weight:800;padding:12px 14px;cursor:pointer;font-size:15px}button.secondary{background:#ecece5;color:var(--ink)}button.purple{background:var(--purple)}
    .row{display:flex;gap:10px;align-items:center}.row input[type=checkbox]{width:auto}.actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}.msg{min-height:24px;margin-top:14px;color:var(--muted);font-weight:650}.ok{color:#137a57}.err{color:#bd2d2d}
    .small{font-size:13px;color:var(--muted)}@media(max-width:800px){.shell{grid-template-columns:1fr}.brand{min-height:auto}.brand h1{font-size:34px}}
  </style>
</head>
<body>
<main>
  <section class="shell">
    <aside class="brand">
      <div>
        <svg class="logo" viewBox="0 0 48 48" aria-hidden="true"><path d="M24 2 L46 10 L46 26 Q46 38 24 46 Q2 38 2 26 L2 10 Z" fill="#534AB7"/><path d="M24 8 L40 15 L40 27 Q40 36 24 42 Q8 36 8 27 L8 15 Z" fill="#7F77DD" opacity="0.4"/><text x="24" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="white">€</text></svg>
        <h1>O meu ordenado<br>Mon salaire</h1>
        <p>Calendário mensal, horas extra, ausências, férias e estimativa salarial numa app privada com SQLite.</p>
      </div>
      <p class="small">Porta 8092 · Node.js + Express · Docker ready</p>
    </aside>
    <section class="panel">
      <div class="tabs">
        <button class="secondary" data-tab="login">Login</button>
        <button class="secondary" data-tab="register">Registo</button>
        <button class="secondary" data-tab="forgot">Password</button>
      </div>

      <form id="login" class="tab active">
        <label>Email</label><input name="email" type="email" required autocomplete="email">
        <label>Password</label><input name="password" type="password" required autocomplete="current-password">
        <label class="row"><input name="rememberMe" type="checkbox"> Lembrar-me / Se souvenir de moi</label>
        <div class="actions"><button class="purple">Entrar / Connexion</button></div>
      </form>

      <form id="register" class="tab">
        <label>Nome / Nom</label><input name="name" required autocomplete="name">
        <label>Email</label><input name="email" type="email" required autocomplete="email">
        <label>Password (mín. 8)</label><input name="password" type="password" minlength="8" required autocomplete="new-password">
        <div class="actions"><button class="purple">Criar conta / Créer le compte</button></div>
        <p class="small">O primeiro utilizador registado fica administrador. Confirma a conta pelo link enviado por email.</p>
      </form>

      <form id="forgot" class="tab">
        <label>Email</label><input name="email" type="email" required autocomplete="email">
        <div class="actions"><button class="purple">Enviar reset / Envoyer</button></div>
      </form>

      <form id="resetForm" class="tab">
        <label>Nova password / Nouveau mot de passe</label><input name="password" type="password" minlength="8" required>
        <div class="actions"><button class="purple">Alterar password</button></div>
      </form>
      <div id="msg" class="msg"></div>
    </section>
  </section>
</main>
<script>
const $ = (s, r=document) => r.querySelector(s);
const msg = (t, ok=false) => { $('#msg').textContent=t; $('#msg').className='msg '+(ok?'ok':'err'); };
const params = new URLSearchParams(location.search);
if (params.get('verified') === 'ok') msg('Conta activada. Já pode iniciar sessão.', true);
if (params.get('verified') === 'invalid') msg('Link de activação inválido ou expirado.');
if (params.get('reset')) showTab('resetForm'); else showTab('login');
document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => showTab(b.dataset.tab));
function showTab(id){ document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id===id)); }
async function api(url, body){ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||'Erro'); return j; }
$('#login').onsubmit = async e => { e.preventDefault(); const f=Object.fromEntries(new FormData(e.target)); f.rememberMe=!!e.target.rememberMe.checked; try{ await api('/api/login',f); location.href='/app'; }catch(err){ msg(err.message==='not_verified'?'Confirme primeiro o email.':'Credenciais inválidas.'); } };
$('#register').onsubmit = async e => { e.preventDefault(); try{ await api('/api/register',Object.fromEntries(new FormData(e.target))); msg('Conta criada. Veja o email para activar.', true); showTab('login'); }catch(err){ msg(err.message==='email_exists'?'Email já registado.':'Dados inválidos. Password mínima: 8 caracteres.'); } };
$('#forgot').onsubmit = async e => { e.preventDefault(); await api('/api/forgot-password',Object.fromEntries(new FormData(e.target))); msg('Se o email existir, foi enviado um link de reset.', true); };
$('#resetForm').onsubmit = async e => { e.preventDefault(); try{ await api('/api/reset-password',{token:params.get('reset'),newPassword:e.target.password.value}); msg('Password alterada. Pode iniciar sessão.', true); showTab('login'); }catch(err){ msg('Link inválido/expirado ou password fraca.'); } };
fetch('/api/me').then(r=>{ if(r.ok) location.href='/app'; });
</script>
</body>
</html>
